
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Portal de Proveedores</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<!-- PANTALLA SETUP (Oculta por defecto) -->
<div id="setup-view" class="hidden fixed inset-0 z-[200] bg-[#004f89] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in duration-500">
        <div class="bg-gray-50 p-10 text-center border-b">
            <h2 class="text-2xl font-black text-[#004f89] mb-2 uppercase">Datos de Contacto</h2>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Información necesaria para operar</p>
        </div>
        <div class="p-10 space-y-6">
            <div class="space-y-2"><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email Corporativo</label><input type="email" id="setup-email" class="w-full p-4 bg-gray-50 border-gray-100 rounded-2xl"></div>
            <div class="space-y-2"><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">WhatsApp de Contacto</label><input type="tel" id="setup-tel" class="w-full p-4 bg-gray-50 border-gray-100 rounded-2xl"></div>
            <button id="btn-save-setup" class="w-full py-5 bg-[#004f89] text-white font-black rounded-2xl shadow-xl hover:bg-blue-900 transition-all">Sincronizar Datos</button>
        </div>
    </div>
</div>

<!-- PORTAL PRINCIPAL -->
<div id="main-portal" class="opacity-0 transition-opacity duration-500">
    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center px-10 h-16 shadow-sm border-b">
        <div class="flex items-center gap-2"><span class="text-[#004f89] font-extrabold text-xl tracking-tighter uppercase">Biosintex Proveedores</span></div>
        <div class="flex items-center gap-4">
            <span class="text-[11px] font-bold text-gray-400 uppercase" id="user-display">---</span>
            <button onclick="logout()" class="text-red-600 font-bold text-xs uppercase px-4 py-2 hover:bg-red-50 rounded-xl transition">Salir</button>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 md:px-12">
        <div class="max-w-7xl mx-auto space-y-12">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-6">
                    <!-- PASO 1 -->
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                        <h2 class="text-xl font-bold mb-6 flex items-center gap-3"><div class="w-2 h-8 bg-[#004f89] rounded-full"></div> 1. Órdenes de Compra Pendientes</h2>
                        <div id="oc-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="col-span-full py-20 text-center animate-pulse text-gray-400 font-bold text-sm uppercase">Cargando ERP...</div>
                        </div>
                    </div>

                    <!-- PASO 2 -->
                    <div id="step-schedule" class="hidden bg-white p-10 rounded-3xl shadow-lg border border-gray-100 animate-in slide-in-from-bottom duration-500">
                        <h2 class="text-xl font-bold mb-8 flex items-center gap-3"><div class="w-2 h-8 bg-emerald-500 rounded-full"></div> 2. Selección de Fecha y Horario</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div class="space-y-2"><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Pallets a entregar</label><input type="number" id="pallets_input" min="1" value="1" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold text-lg focus:ring-2 focus:ring-[#004f89]"></div>
                            <div class="space-y-2"><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Fecha solicitada</label><input type="date" id="date_input" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-[#004f89]"></div>
                        </div>
                        <div id="slots-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3"></div>
                    </div>
                </div>

                <!-- RESUMEN -->
                <div class="space-y-6">
                    <div id="summary-card" class="hidden sticky top-24 bg-[#004f89] rounded-[2rem] p-8 text-white shadow-2xl space-y-6">
                        <h3 class="text-xl font-bold flex items-center gap-2"><span class="material-symbols-outlined">verified</span> Mi Reserva</h3>
                        <div class="space-y-4">
                            <div><p class="text-[10px] text-blue-200 font-bold uppercase tracking-widest">Lugar de Entrega</p><p id="sum-planta" class="font-bold text-xs"></p></div>
                            <div><p class="text-[10px] text-blue-200 font-bold uppercase tracking-widest">Material</p><p id="sum-articulo" class="text-[11px] font-medium"></p></div>
                            <div class="bg-white/10 p-5 rounded-2xl"><p class="text-[10px] text-blue-200 font-bold uppercase mb-1">Día y Hora</p><p id="sum-time" class="text-2xl font-black">-</p></div>
                        </div>
                        <button id="confirm-btn" disabled class="w-full py-5 bg-white text-[#004f89] font-black rounded-2xl shadow-lg disabled:opacity-50">CONFIRMAR TURNO</button>
                    </div>
                </div>
            </div>

            <!-- HISTORIAL -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b bg-gray-50"><h2 class="font-black text-gray-700 uppercase text-[10px] tracking-widest">Mis Entregas Programadas</h2></div>
                <div class="overflow-x-auto"><table class="w-full text-left font-bold text-[11px]"><thead class="bg-gray-50 text-[9px] font-black text-gray-400 uppercase border-b"><tr><th class="px-8 py-5">Fecha</th><th class="px-8 py-5">Hora</th><th class="px-8 py-5">Planta</th><th class="px-8 py-5">OC</th><th class="px-8 py-5 text-center">Pallets</th><th class="px-8 py-5 text-center">Estado</th></tr></thead><tbody id="history-body" class="divide-y divide-gray-100"></tbody></table></div>
            </div>
        </div>
    </main>
</div>

<script>
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);

    const ADDR_BARRACAS = "Barracas - Salom 657";
    const ADDR_PIBERA = "Pibera - Autovía Ruta 2 Km. 38,000 Centro Agrícola El Pato Colectora Este Km. 39,000";

    function formatPlanta(name) {
        const s = String(name).toLowerCase();
        if (s.includes('biosintex') || s.includes('barracas')) return ADDR_BARRACAS;
        if (s.includes('pibera') || s.includes('leloir')) return ADDR_PIBERA;
        return name;
    }

    function logout() { localStorage.removeItem('biosintex_session'); window.location.href = 'login.html'; }

    var db = {}; var currentOC = null; var selectedSlot = null;

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('user-display').innerText = currentUser.nombre;
        if (!currentUser.email || !currentUser.telefono || currentUser.email.trim() === "" || currentUser.telefono.trim() === "") {
            document.getElementById('setup-view').classList.remove('hidden');
        } else {
            initPortal();
        }

        document.getElementById('btn-save-setup').onclick = async () => {
            const email = document.getElementById('setup-email').value.trim();
            const tel = document.getElementById('setup-tel').value.trim();
            if (!email || !tel) return alert("Completa los datos corporativos.");
            const btn = document.getElementById('btn-save-setup'); btn.disabled = true;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'update_profile', username: currentUser.username, email: email, telefono: tel }) });
                if ((await res.json()).success) {
                    currentUser.email = email; currentUser.telefono = tel;
                    localStorage.setItem('biosintex_session', JSON.stringify(currentUser));
                    document.getElementById('setup-view').classList.add('hidden');
                    initPortal();
                }
            } catch(e) { alert("Error."); btn.disabled = false; }
        };
    });

    function initPortal() { document.getElementById('main-portal').classList.remove('opacity-0'); loadData(); }

    async function loadData() {
        try {
            const res = await fetch(CONFIG.API_URL + "?action=get_all");
            const raw = await res.json();
            db = {}; Object.keys(raw).forEach(k => { db[k.trim().toLowerCase()] = raw[k]; });
            renderOCs();
            renderHistory();
        } catch(e) { document.getElementById('oc-container').innerHTML = '<p class="col-span-full py-10 text-center text-red-500 font-bold uppercase text-xs">Error de Sincronización ERP</p>'; }
    }

    function renderOCs() {
        const userOrders = (db.maestro_oc || []).filter(o => String(o.nombre_proveedor || o.proveedor_id).split('.')[0].trim() === String(currentUser.proveedor_id).trim());
        document.getElementById('oc-container').innerHTML = userOrders.map(o => `
            <div onclick="selectOC(this, '${o.oc}')" class="oc-card p-6 border-2 border-gray-100 rounded-[2rem] cursor-pointer hover:border-[#004f89] transition-all bg-white relative overflow-hidden group shadow-sm">
                <div class="flex justify-between items-start mb-4"><span class="text-[9px] font-black text-[#004f89] bg-blue-50 px-3 py-1 rounded-full uppercase">OC: ${o.oc}</span><span class="text-[9px] font-black text-emerald-600 uppercase">PEND: ${o.pendiente}</span></div>
                <p class="text-xs font-bold text-gray-800 leading-tight mb-2">${o.articulo}</p>
                <p class="text-[9px] font-black text-gray-400 uppercase">📍 ${formatPlanta(o.planta)}</p>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-100 group-hover:bg-[#004f89]"></div>
            </div>
        `).join('') || '<div class="col-span-full py-10 text-center text-gray-400 font-bold text-xs uppercase">No hay pedidos pendientes vinculados a tu ID.</div>';
    }

    window.selectOC = (el, ocNumber) => {
        currentOC = db.maestro_oc.find(o => String(o.oc) === String(ocNumber));
        document.querySelectorAll('.oc-card').forEach(c => c.classList.remove('border-[#004f89]', 'shadow-xl'));
        el.classList.add('border-[#004f89]', 'shadow-xl');
        document.getElementById('step-schedule').classList.remove('hidden');
        document.getElementById('summary-card').classList.remove('hidden');
        document.getElementById('sum-planta').innerText = formatPlanta(currentOC.planta);
        document.getElementById('sum-articulo').innerText = currentOC.articulo;
        
        const minDate = new Date(); minDate.setDate(minDate.getDate() + 2); // 48hs
        const dateInp = document.getElementById('date_input');
        dateInp.min = minDate.toISOString().split('T')[0];
        resetSelection();
    };

    function resetSelection() { selectedSlot = null; document.getElementById('sum-time').innerText = "-"; document.getElementById('confirm-btn').disabled = true; renderSlots(); }
    document.getElementById('date_input').onchange = renderSlots;
    document.getElementById('pallets_input').oninput = renderSlots;

    function renderSlots() {
        const container = document.getElementById('slots-container');
        const dateStr = document.getElementById('date_input').value;
        const pallets = parseInt(document.getElementById('pallets_input').value) || 1;
        if (!dateStr) return;

        // REGLA 1: BLOQUEOS DE SUPERVISOR
        const isBlocked = (db.bloqueos || []).some(b => b.fecha === dateStr);
        if (isBlocked) { container.innerHTML = '<p class="col-span-full py-4 bg-red-50 text-red-600 text-[10px] font-black uppercase text-center rounded-xl border border-red-100">Día bloqueado para recepciones. Seleccione otra fecha.</p>'; return; }

        const dObj = new Date(dateStr + "T00:00:00");
        if (dObj.getDay() === 0 || dObj.getDay() === 6) { container.innerHTML = '<p class="col-span-full py-4 text-amber-600 text-[10px] font-black uppercase text-center italic">Cerrado fines de semana.</p>'; return; }

        // REGLA 2: CAPACIDAD POR PALLETS (1 SLOT = 5 PALLETS, ÚLTIMO SLOT POSIBLE A LAS 12:00 FINALIZA A LAS 13:00)
        const times = ["07:00", "08:00", "09:00", "10:00", "11:00", "12:00"];
        const neededSlots = Math.ceil(pallets / 5);
        
        container.innerHTML = times.map((t, index) => {
            const startHour = parseInt(t.split(':')[0]);
            const isTooLate = (startHour + neededSlots) > 13; // Si empieza a las 11 y necesita 3 hs -> 14 (Se pasa)
            
            return `
                <button onclick="setSlot('${t}')" 
                    ${isTooLate ? 'disabled' : ''} 
                    class="p-4 text-xs font-black rounded-2xl border-2 transition-all shadow-sm
                    ${selectedSlot === t ? 'bg-[#004f89] text-white border-[#004f89]' : 'bg-white text-gray-700 border-gray-100 hover:border-[#004f89]'} 
                    disabled:bg-gray-50 disabled:text-gray-200 disabled:border-gray-50">
                    ${t}
                </button>`;
        }).join('');
    }

    window.setSlot = (t) => { selectedSlot = t; const d = document.getElementById('date_input').value.split('-').reverse().join('/'); document.getElementById('sum-time').innerText = `${d} - ${t}`; document.getElementById('confirm-btn').disabled = false; renderSlots(); };

    document.getElementById('confirm-btn').onclick = async () => {
        const data = { action:'book_shift', proveedor_id:currentUser.proveedor_id, nombre_proveedor:currentUser.nombre, fecha:document.getElementById('date_input').value, hora:selectedSlot, planta:currentOC.planta, oc:currentOC.oc, articulo:currentOC.articulo, pallets:document.getElementById('pallets_input').value };
        const btn = document.getElementById('confirm-btn'); btn.disabled = true;
        try {
            const res = await fetch(CONFIG.API_URL, { method:'POST', body:JSON.stringify(data) });
            if ((await res.json()).success) { alert("¡Turno confirmado!"); location.reload(); }
        } catch(e) { alert("Error."); btn.disabled = false; }
    };

    function renderHistory() {
        const histBody = document.getElementById('history-body');
        const myShifts = (db.turnos || []).filter(s => String(s.proveedor_id).trim() === String(currentUser.proveedor_id).trim() && String(s.estado).toLowerCase().trim() === 'confirmado');
        histBody.innerHTML = myShifts.sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(s => `
            <tr class="hover:bg-gray-50">
                <td class="px-8 py-4">${s.fecha.split('-').reverse().join('/')}</td>
                <td class="px-8 py-4 text-[#004f89]">${s.hora} hs</td>
                <td class="px-8 py-4 text-[10px] text-gray-400 capitalize">${formatPlanta(s.planta)}</td>
                <td class="px-8 py-4">${s.oc}</td>
                <td class="px-8 py-4 text-center">${s.pallets || 1}</td>
                <td class="px-8 py-4 text-center"><span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg text-[10px] border border-emerald-100 uppercase">Confirmado</span></td>
            </tr>
        `).join('') || '<tr><td colspan="6" class="p-10 text-center text-gray-400 italic font-medium uppercase text-[10px]">Sin turnos programados.</td></tr>';
    }
</script>
</body>
</html>
