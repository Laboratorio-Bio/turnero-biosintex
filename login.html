
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div class="flex items-center justify-center gap-2 mb-8">
        <span class="text-[#004f89] font-extrabold text-2xl tracking-tighter">Biosintex</span>
    </div>

    <div id="alert" class="hidden mb-4 p-4 rounded text-sm"></div>

    <h2 class="text-xl font-bold mb-6 text-center">Ingreso</h2>
    <form id="loginForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Usuario</label>
            <input type="text" id="username" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#004f89] focus:ring focus:ring-[#004f89]" placeholder="ID Proveedor">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input type="password" id="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#004f89] focus:ring focus:ring-[#004f89]">
        </div>
        <button type="submit" id="btnSubmit" class="w-full py-2 px-4 bg-[#004f89] text-white rounded-md hover:bg-blue-800 transition font-bold">Ingresar</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('btnSubmit');
        const alert = document.getElementById('alert');

        btn.disabled = true;
        btn.innerText = "Verificando...";
        alert.classList.add('hidden');

        try {
            // NOTA: Para GAS usamos fetch con POST. 
            // Necesitamos pasarle el payload como string en el body.
            const response = await fetch(CONFIG.API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "login", 
                    username: user, 
                    password: pass 
                })
            });
            const data = await response.json();

            if (data.success) {
                // Guardar sesión - 'data' ya contiene rol, nombre, etc.
                localStorage.setItem('biosintex_session', JSON.stringify(data));
                
                if (data.rol === 'supervisor') {
                    window.location.href = 'supervisor.html';
                } else {
                    window.location.href = 'proveedor.html';
                }
            } else {
                alert.innerText = data.error || "Usuario o contraseña incorrectos";
                alert.className = "mb-4 p-4 rounded bg-red-100 text-red-700 text-sm";
                alert.classList.remove('hidden');
            }
        } catch (err) {
            console.error(err);
            alert.innerText = "Error técnico: " + err.message + ". Verificá la URL en config.js.";
            alert.className = "mb-4 p-4 rounded bg-red-100 text-red-700 text-sm";
            alert.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.innerText = "Ingresar";
        }
    });
</script>

</body>
</html>
