
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Panel Supervisor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<header class="fixed top-0 w-full z-50 bg-white flex justify-between items-center px-6 h-16 shadow-sm border-b">
    <div class="flex items-center gap-2">
        <span class="text-[#004f89] font-extrabold text-xl tracking-tighter">Biosintex Supervisor</span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-sm font-bold text-gray-500">Panel Gerencial</span>
        <a href="#" onclick="logout(); return false;" class="text-red-600 font-medium hover:underline text-sm border px-3 py-1 rounded">Cerrar Sesión</a>
    </div>
</header>

<main class="pt-24 pb-12 px-4 md:px-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-extrabold text-[#0b1c30] tracking-tighter">Calendario de Turnos</h1>
                <p class="text-gray-500 mt-1">Vista desde Google Sheets</p>
            </div>
            <div class="flex gap-3 items-center">
                <select id="plantaFilter" class="p-2 border rounded-md shadow-sm focus:border-[#004f89]">
                    <option value="all">Todas las Plantas</option>
                    <option value="Barracas">Planta Barracas</option>
                    <option value="Pibera">Planta Pibera</option>
                </select>
                <a href="https://docs.google.com/spreadsheets" target="_blank" class="bg-green-600 text-white px-4 py-2 rounded-md font-bold text-sm hover:bg-green-700 transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">grid_on</span>
                    Abrir Excel de Google
                </a>
            </div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div id='calendar'></div>
        </div>
    </div>
</main>

<script>
    // SESIÓN
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);
    if (currentUser.rol !== 'supervisor') window.location.href = 'proveedor.html';

    function logout() {
        localStorage.removeItem('biosintex_session');
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            slotMinTime: '07:00:00',
            slotMaxTime: '14:00:00',
            hiddenDays: [0, 6],
            allDaySlot: false,
            eventClick: function(info) {
                alert(`Turno: ${info.event.title}\nProveedor: ${info.event.extendedProps.supplier}`);
            }
        });
        calendar.render();

        // Cargar eventos desde Google
        try {
            const res = await fetch(CONFIG.API_URL + "?action=get_all");
            const db = await res.json();
            const shifts = db.TURNOS || [];
            
            const events = shifts.map(s => {
                const color = s.planta === 'Barracas' ? '#004f89' : '#006e2d';
                return {
                    id: s.id,
                    title: `${s.planta} - OC: ${s.oc}`,
                    start: `${s.fecha}T${s.hora}:00`,
                    end: `${s.fecha}T${parseInt(s.hora.split(':')[0]) + 1}:00:00`,
                    backgroundColor: color,
                    borderColor: color,
                    extendedProps: {
                        supplier: s.nombre_proveedor,
                        planta: s.planta
                    }
                };
            });
            calendar.addEventSource(events);

            // Filtro
            document.getElementById('plantaFilter').onchange = (e) => {
                const val = e.target.value;
                calendar.getEvents().forEach(ev => {
                    if (val === 'all' || ev.extendedProps.planta === val) ev.setProp('display', 'auto');
                    else ev.setProp('display', 'none');
                });
            };

        } catch (e) {
            console.error("Error cargando calendario:", e);
        }
    });

</script>
</body>
</html>
